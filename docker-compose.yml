services:

  # Paperless-ngx: Dokumentenarchiv mit OCR
  paperless-redis:
    image: redis:7
    container_name: paperless-redis
    restart: unless-stopped
    networks:
      - privat
    volumes:
      - ./paperless/redis:/data

  paperless-db:
    image: postgres:15
    container_name: paperless-db
    restart: unless-stopped
    networks:
      - privat
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${PAPERLESS_DBPASS}
    volumes:
      - ./paperless/db:/var/lib/postgresql/data

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: unless-stopped
    depends_on:
      - paperless-db
      - paperless-redis
    networks:
      - privat
    ports:
      - "127.0.0.1:8010:8000"
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${PAPERLESS_DBPASS}
      PAPERLESS_OCR_LANGUAGE: deu+eng
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_TIME_ZONE: Europe/Berlin
      PAPERLESS_OCR_MODE: skip_noarchive
      PAPERLESS_CONSUMER_POLLING: 60
      USERMAP_UID: 1000
      USERMAP_GID: 1000
    volumes:
      - ./paperless/data:/usr/src/paperless/data
      - ./paperless/media:/usr/src/paperless/media
      - ./paperless/export:/usr/src/paperless/export
      - ./paperless/consume:/usr/src/paperless/consume

  # AnythingLLM: AI-Chat über Dokumente
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    restart: unless-stopped
    networks:
      - privat
    ports:
      - "127.0.0.1:3002:3001"
    environment:
      STORAGE_DIR: /app/server/storage
      LLM_PROVIDER: ollama
      OLLAMA_BASE_PATH: http://host.docker.internal:11434
      OLLAMA_MODEL_PREF: gemma4:e4b
      OLLAMA_MODEL_TOKEN_LIMIT: 65536
      EMBEDDING_ENGINE: ollama
      EMBEDDING_BASE_PATH: http://host.docker.internal:11434
      EMBEDDING_MODEL_PREF: nomic-embed-text:latest
    volumes:
      - ./anythingllm/storage:/app/server/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  privat:
    driver: bridge
